<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowers</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet">
    <link rel="icon" type="png/image" href="FavIcon/Tulips.png">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="Css/flowers.css">
</head>

<body>

    <h1 class="flowers-heading">Flowers for You</h1>

    <!-- Sticky Notes Left -->
    <div class="sticky sticky-left note1">
        <p>
            I hope this flower can make you smile today🌷
        </p>
    </div>

    <div class="sticky sticky-left note2">
        <p>
            I hope life gives you reasons to smile every day:)
        </p>
    </div>

    <!-- Flower -->
    <div class="tulips_container">
        <img class="tulips" src="Images/tulips.png" alt="Tulips">
        <span id="tulipsText" class="tulipsAnimate">Tulips</span>
    </div>

    <!-- Sticky Notes Right -->
    <div class="sticky sticky-right note3">
        <p>
            Just a small reminder that you're appreciated
        </p>
    </div>

    <div class="sticky sticky-right note4">
        <p>
            This page blooms because of you.
        </p>
    </div>

    <!-- Back Button -->
    <div class="button_holder" id="buttonBack">
        <a href="home.html">
            <button class="back">
                <i class="fa-solid fa-circle-arrow-left"></i>
            </button>
        </a>
    </div>


    <script src="Js/flowers.js"></script>
</body>

</html>

</html>
